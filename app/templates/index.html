<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>POPMAP</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='leaflet/leaflet.css') }}" />
        <link rel="stylesheet" href="{{ url_for('leaflet_draw_css_local') }}?v=local4" />
        <style>
            html,
            body {
                height: 100%;
                margin: 0;
                font-family: "Segoe UI", sans-serif;
                background: #f4f4f4;
            }

            #map {
                width: 100%;
                height: calc(100% - 92px);
            }

            #header-container {
                display: flex;
                justify-content: center;
                align-items: center;
                position: relative;
                padding: 10px 20px;
                background: #2c3e50;
                color: white;
            }

            #merge-container {
                position: absolute;
                left: 10px;
                top: 50%;
                transform: translateY(-50%);
                display: flex;
                align-items: center;
                gap: 6px;
            }

            #refresh-rate-control {
                display: flex;
                align-items: center;
                gap: 4px;
                margin-right: 8px;
            }

            #refresh-rate-slider {
                width: 80px;
                height: 4px;
                cursor: pointer;
            }

            #refresh-rate-value {
                min-width: 34px;
                font-size: 12px;
                opacity: 0.9;
            }

            #merge-timer {
                margin-left: 6px;
            }

            #merge-container button {
                padding: 4px 8px;
                border: none;
                border-radius: 4px;
                background: #2980b9;
                color: white;
                cursor: pointer;
            }

            #merge-container button:hover {
                background: #3498db;
            }

            #header-buttons {
                position: absolute;
                right: 20px;
                top: 50%;
                transform: translateY(-50%);
            }

            #header-buttons button {
                padding: 6px 12px;
                border: none;
                border-radius: 4px;
                background: #2980b9;
                color: white;
                cursor: pointer;
            }

            #header-buttons button:hover {
                background: #3498db;
            }

            #controls {
                display: flex;
                justify-content: center;
                gap: 10px;
                flex-wrap: wrap;
                padding: 10px 20px;
                background: #f4f4f4;
                border-bottom: 1px solid #111;
            }

            .input-with-button {
                position: relative;
                display: inline-block;
            }

            .input-with-button input {
                width: 270px;
                height: 32px;
                padding: 6px 30px 6px 8px;
                font-size: 14px;
                border-radius: 4px;
                border: 1px solid #ccc;
                box-sizing: border-box;
            }

            .input-with-button button {
                position: absolute;
                right: 4px;
                top: 50%;
                transform: translateY(-50%);
                width: 20px;
                height: 20px;
                padding: 0;
                border: none;
                background: none;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                color: #2980b9;
            }

            .input-with-button button:hover {
                color: #3498db;
            }

            #controls button:not(.paste-btn) {
                padding: 6px 12px;
                border-radius: 4px;
                border: none;
                background: #2980b9;
                color: white;
                cursor: pointer;
            }

            #controls button:not(.paste-btn):hover {
                background: #3498db;
            }

            #eta-left {
                margin-top: 10px;
                font-size: 12px;
                color: #444;
                min-width: 120px;
                display: inline-block;
                text-align: left;
            }

            .copy-btn {
                background: none;
                border: none;
                cursor: pointer;
                padding: 2px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }

            .copy-btn svg {
                width: 18px;
                height: 18px;
                stroke: #2980b9;
                stroke-width: 2;
                fill: none;
                transition: 0.2s;
            }

            .copy-btn:hover svg {
                stroke: #3498db;
            }

            .paste-btn svg {
                width: 16px;
                height: 16px;
                fill: #2980b9;
                transition: 0.2s;
            }

            .paste-btn:hover svg {
                fill: #3498db;
            }

            .toolbar-label {
                position: absolute;
                z-index: 1001;
                font-weight: bold;
                font-size: 14px;
                padding: 2px 6px;
                border-radius: 4px;
                background: white;
                text-align: center;
            }

            .leaflet-popup-content svg {
                pointer-events: none;
            }

            .color-btn {
                border-radius: 3px;
                cursor: pointer;
            }

            .leaflet-draw-actions {
                transition: opacity 0.2s;
            }
            
            .leaflet-disabled.leaflet-draw-toolbar {
                opacity: 0.4;
                pointer-events: none;
            }
            
            .leaflet-draw-toolbar {
                z-index: 1000 !important;
                display: block !important;
                visibility: visible !important;
                margin-top: 0px !important;
                margin-left: 40px !important;
            }
            
            .leaflet-draw {
                position: relative;
                z-index: 1000 !important;
                display: block !important;
                visibility: visible !important;
            }
            
            .leaflet-draw-section {
                display: block !important;
            }
            
            .leaflet-draw-actions {
                margin-left: 40px !important;
            }
            
            .leaflet-bar {
                display: block !important;
            }

            .leaflet-draw-toolbar a {
                background-image: url('/leaflet-draw/local/images/spritesheet.png') !important;
                background-image: linear-gradient(transparent, transparent), url('/leaflet-draw/local/images/spritesheet.svg') !important;
            }

            .leaflet-retina .leaflet-draw-toolbar a {
                background-image: url('/leaflet-draw/local/images/spritesheet-2x.png') !important;
                background-image: linear-gradient(transparent, transparent), url('/leaflet-draw/local/images/spritesheet.svg') !important;
            }

            .leaflet-color-toggle-control {
                position: absolute !important;
                top: 100px !important;
                left: 10px !important;
                margin-top: 0 !important;
                margin-left: 0 !important;
                z-index: 1001 !important;
            }

            #site-alert {
                position: fixed;
                top: 10px;
                left: 50%;
                transform: translateX(-50%);
                background: #f44336;
                color: white;
                padding: 0;
                border-radius: 4px;
                display: none;
                z-index: 10000;
                box-shadow: 0 2px 8px rgba(0,0,0,0.2);
                max-width: 600px;
                min-width: 320px;
                overflow: hidden;
            }

            #site-alert-inner {
                display: flex;
                align-items: flex-start;
                gap: 10px;
                padding: 12px 14px;
            }

            #site-alert-body {
                flex: 1;
                white-space: pre-line;
                line-height: 1.35;
                font-size: 14px;
                text-align: left;
            }

            #site-alert-close {
                border: none;
                background: transparent;
                color: white;
                font-size: 18px;
                line-height: 1;
                cursor: pointer;
                padding: 0;
                width: 20px;
                height: 20px;
                opacity: 0.9;
            }

            #site-alert-close:hover {
                opacity: 1;
            }
        </style>
    </head>

    <body>
        
        <div id="site-alert" role="alert" aria-live="polite">
            <div id="site-alert-inner">
                <div id="site-alert-body"></div>
                <button id="site-alert-close" type="button" aria-label="Close popup">x</button>
            </div>
        </div>

        <div id="header-container">
            <div>POPMAP</div>
            <div id="merge-container">
                <div id="refresh-rate-control" title="Refresh rate in seconds">
                    <input type="range" id="refresh-rate-slider" min="2" max="60" step="1" value="10">
                    <span id="refresh-rate-value">10s</span>
                </div>
                <div id="merge-timer">Refresh in: 10</div>
                <button id="pause-btn">Pause</button>
            </div>
            <div id="header-buttons">
                <button onclick="initializeDemoDrawings()">Initialize</button>
                <button onclick="location.href='/logout'">Logout</button>
            </div>
        </div>

        <div id="controls">
            <div class="input-with-button">
                <input id="start" placeholder="Start lat,lon e.g. 35.189427,33.050308">
                <button class="paste-btn" data-target="start" title="Paste">
                    <svg viewBox="0 0 24 24">
                        <path d="M16 2H8C7.4477 2 7 2.4477 7 3V5H5C4.4477 5 4 5.4477 4 6V21C4 21.5523 4.4477 22 5 22H19C19.5523 22 20 21.5523 20 21V6C20 5.4477 19.5523 5 19 5H17V3C17 2.4477 16.5523 2 16 2ZM9 4H15V5H9V4ZM6 7H18V20H6V7Z" />
                    </svg>
                </button>
            </div>
            <div class="input-with-button">
                <input id="goal" placeholder="Goal lat,lon e.g. 35.216094,33.012543">
                <button class="paste-btn" data-target="goal" title="Paste">
                    <svg viewBox="0 0 24 24">
                        <path d="M16 2H8C7.4477 2 7 2.4477 7 3V5H5C4.4477 5 4 5.4477 4 6V21C4 21.5523 4.4477 22 5 22H19C19.5523 22 20 21.5523 20 21V6C20 5.4477 19.5523 5 19 5H17V3C17 2.4477 16.5523 2 16 2ZM9 4H15V5H9V4ZM6 7H18V20H6V7Z" />
                    </svg>
                </button>
            </div>
            <div style="display: flex; align-items: center; gap: 5px;">
                <label for="clearanceDistance">Min hostile distance:</label>
                <input type="range" id="clearanceDistance" min="0" max="100" step="1" value="0">
                <span id="clearanceValue">10</span> m
            </div>
            <button id="show-path-btn" onclick="plotPath()">Show Path</button>
            <span id="eta-left"></span>
        </div>

        <div id="map"></div>

        <script src="{{ url_for('static', filename='leaflet/leaflet.js') }}"></script>
        <script src="{{ url_for('leaflet_draw_js_local') }}?v=local4"></script>
        <script>
            if (typeof L.Control.Draw === 'undefined') {
                alert('ERROR: Leaflet Draw library failed to load. Drawing tools will not work.');
            }
            
            let siteAlertTimer = null;

            function hideAlert() {
                const alertDiv = document.getElementById('site-alert');
                alertDiv.style.display = 'none';
                if (siteAlertTimer) {
                    clearTimeout(siteAlertTimer);
                    siteAlertTimer = null;
                }
            }

            function showAlert(msg, type='error', duration=5000) {
                const alertDiv = document.getElementById('site-alert');
                const bodyDiv = document.getElementById('site-alert-body');

                if (!document.getElementById('site-alert-close').dataset.bound) {
                    const closeBtn = document.getElementById('site-alert-close');
                    closeBtn.addEventListener('click', hideAlert);
                    closeBtn.dataset.bound = '1';
                }

                if (type === 'low') {
                    alertDiv.style.background = '#4CAF50';
                } else if (type === 'medium') {
                    alertDiv.style.background = '#FF9800';
                } else if (type === 'high') {
                    alertDiv.style.background = '#f44336';
                } else if (type === 'success') {
                    alertDiv.style.background = '#4CAF50';
                } else if (type === 'warning') {
                    alertDiv.style.background = '#FF9800';
                } else if (type === 'info') {
                    alertDiv.style.background = '#2196F3';
                } else {
                    alertDiv.style.background = '#f44336';
                }

                bodyDiv.textContent = msg;
                alertDiv.style.display = 'block';

                if (siteAlertTimer) clearTimeout(siteAlertTimer);
                if (duration > 0) {
                    siteAlertTimer = setTimeout(hideAlert, duration);
                }
            }


            let map = L.map('map', {
                center: [35.029294, 33.050995],
                zoom: 11,
                minZoom: 11,
                maxZoom: 18
            });

            let etaCountdownTimer = null;

            function setEtaText(text) {
                const etaEl = document.getElementById('eta-left');
                etaEl.textContent = text || '';
            }

            function stopEtaCountdown() {
                if (etaCountdownTimer) {
                    clearInterval(etaCountdownTimer);
                    etaCountdownTimer = null;
                }
            }

            function startEtaCountdown(totalSeconds) {
                stopEtaCountdown();

                let remaining = Math.max(0, Math.round(totalSeconds));
                const render = () => {
                    const mins = Math.floor(remaining / 60);
                    const secs = remaining % 60;
                    setEtaText(`Calculating... ${mins}:${String(secs).padStart(2, '0')}`);
                };

                render();
                etaCountdownTimer = setInterval(() => {
                    remaining -= 1;
                    if (remaining <= 0) {
                        stopEtaCountdown();
                        setEtaText('Calculating... 0:00');
                        return;
                    }
                    render();
                }, 1000);
            }

            L.tileLayer('/tiles/{z}/{x}/{y}.png', {
                maxNativeZoom: 15,
                maxZoom: 18,
                noWrap: true
            }).addTo(map);

            let editableLayers = new L.FeatureGroup().addTo(map);
            let drawings = [];
            let lastMarkerClick = null;
            let refreshPaused = false;
            const REFRESH_RATE_KEY = 'refreshRateSec';
            let pollIntervalSec = parseInt(localStorage.getItem(REFRESH_RATE_KEY), 10);
            if (isNaN(pollIntervalSec)) {
                pollIntervalSec = 10;
            }
            pollIntervalSec = Math.min(60, Math.max(2, pollIntervalSec));


            const COLORS = ['blue', 'red', 'green', 'orange', 'yellow', 'violet', 'grey', 'black'];
            let currentColor = 'blue';
            let markerIcons = {};
            COLORS.forEach(c => {
                markerIcons[c] = new L.Icon({
                    iconUrl: `static/leaflet/images/marker-icon-${c}.png`,
                    shadowUrl: 'static/leaflet/images/marker-shadow.png',
                    iconSize: [25, 41],
                    iconAnchor: [12, 41],
                    popupAnchor: [1, -34],
                    shadowSize: [41, 41]
                });
            });


            L.Control.ColorToggle = L.Control.extend({
                onAdd: function (map) {
                    const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-custom');
                    container.classList.add('leaflet-color-toggle-control');
                    container.style.background = 'white';
                    container.style.padding = '4px';
                    container.style.borderRadius = '4px';
                    container.style.display = 'flex';
                    container.style.flexDirection = 'column';
                    container.style.gap = '2px';
                    container.title = 'Select draw color';
                    COLORS.forEach(c => {
                        const btn = L.DomUtil.create('div', 'color-btn', container);
                        btn.style.width = '18px';
                        btn.style.height = '18px';
                        btn.style.background = c;
                        btn.style.border = c === currentColor ? '2px solid black' : '1px solid #ccc';
                        btn.addEventListener('click', () => {
                            currentColor = c;
                            container.querySelectorAll('.color-btn').forEach(el => el.style.border = '1px solid #ccc');
                            btn.style.border = '2px solid black';
                        });
                    });
                    return container;
                },
                onRemove: function () { }
            });

            let drawControl = new L.Control.Draw({
                position: 'topleft',
                draw: {
                    polygon: { 
                        shapeOptions: { color: currentColor },
                        repeatMode: false
                    },
                    polyline: { 
                        shapeOptions: { color: currentColor },
                        repeatMode: false 
                    },
                    rectangle: { 
                        shapeOptions: { color: currentColor },
                        repeatMode: false 
                    },
                    circle: { 
                        shapeOptions: { color: currentColor },
                        repeatMode: false 
                    },
                    marker: { 
                        icon: markerIcons[currentColor],
                        repeatMode: false 
                    },
                    circlemarker: { 
                        color: currentColor, 
                        fillColor: currentColor, 
                        fillOpacity: 1,
                        repeatMode: false 
                    }
                },
                edit: {
                    featureGroup: editableLayers,
                    remove: true,
                    edit: false
                }
            });
            map.addControl(drawControl);

            const colorControl = new L.Control.ColorToggle({ position: 'topleft' });
            colorControl.addTo(map);
            
            window.mapDrawControl = drawControl;


            function layerToFeature(layer, color) {
                if (!layer._leaflet_id) layer._leaflet_id = L.stamp(layer);
                let f = { type: "Feature", properties: { _id: layer._leaflet_id, deleted: false, color, hostile: layer._hostile || false }, geometry: {} };
                if (layer instanceof L.Marker || layer instanceof L.Circle || layer instanceof L.CircleMarker) {
                    const ll = layer.getLatLng();
                    f.geometry = { type: "Point", coordinates: [ll.lng, ll.lat] };
                    if (layer instanceof L.Circle) f.properties.radius = layer.getRadius();
                    else if (layer instanceof L.CircleMarker) f.properties.isCircleMarker = true;
                    else if (layer instanceof L.Marker) f.properties.isMarker = true;
                } else if (layer instanceof L.Polygon) f.geometry = { type: "Polygon", coordinates: [layer.getLatLngs()[0].map(c => [c.lng, c.lat])] };
                else if (layer instanceof L.Polyline) f.geometry = { type: "LineString", coordinates: layer.getLatLngs().map(c => [c.lng, c.lat]) };
                return f;
            }

            function featureToLayer(f) {
                let layer = null;
                const c = f.properties.color || 'blue';
                const g = f.geometry;
                if (g.type === "Polygon") layer = L.polygon(g.coordinates[0].map(p => [p[1], p[0]]), { color: c, fillColor: c, fillOpacity: 0.5 });
                if (g.type === "LineString") layer = L.polyline(g.coordinates.map(p => [p[1], p[0]]), { color: c });
                if (g.type === "Point") {
                    if (f.properties.radius) layer = L.circle([g.coordinates[1], g.coordinates[0]], { radius: f.properties.radius, color: c });
                    else if (f.properties.isCircleMarker) layer = L.circleMarker([g.coordinates[1], g.coordinates[0]], { color: c, fillColor: c, fillOpacity: 1 });
                    else if (f.properties.isMarker) layer = L.marker([g.coordinates[1], g.coordinates[0]], { icon: markerIcons[c] });
                }
                if (layer) {
                    layer._leaflet_id = f.properties._id;
                    layer._hostile = f.properties.hostile || false;
                }
                return layer;
            }


            function bindMarkerPopup(layer) {
                const ll = layer.getLatLng();
                layer.bindPopup(`
                    <div style="display:flex;flex-direction:column;gap:6px">
                        <div style="display:flex;align-items:center;gap:6px;">
                            <span class="popup-label">${ll.lng.toFixed(6)},${ll.lat.toFixed(6)}</span>
                            <button class="copy-btn" title="Copy">
                                <svg viewBox="0 0 24 24">
                                    <rect x="9" y="9" width="13" height="13" rx="2"></rect>
                                    <rect x="3" y="3" width="13" height="13" rx="2"></rect>
                                </svg>
                            </button>
                        </div>
                        <label><input type="checkbox" class="hostile-toggle"/> Hostile</label>
                    </div>
                `, { closeButton: true });
                layer.on('popupopen', () => {
                    const cb = layer.getPopup().getElement().querySelector('.hostile-toggle');
                    cb.checked = layer._hostile || false;
                    cb.addEventListener('change', () => {
                        layer._hostile = cb.checked;
                        const f = drawings.find(f => f.properties._id === layer._leaflet_id);
                        if (f) f.properties.hostile = layer._hostile;
                        saveDrawings();
                    });
                });
                layer.on('click', () => {
                    lastMarkerClick = layer;
                });
            }

            function bindShapePopup(layer) {
                layer.bindPopup(`
                    <div style="display:flex;flex-direction:column;gap:6px">
                        <label><input type="checkbox" class="hostile-toggle"/> Hostile</label>
                    </div>
                `, { closeButton: true });
                layer.on('popupopen', () => {
                    const cb = layer.getPopup().getElement().querySelector('.hostile-toggle');
                    cb.checked = layer._hostile || false;
                    cb.addEventListener('change', () => {
                        layer._hostile = cb.checked;
                        const f = drawings.find(f => f.properties._id === layer._leaflet_id);
                        if (f) f.properties.hostile = layer._hostile;
                        saveDrawings();
                    });
                });
            }


            function saveDrawings() {
                fetch('/save_drawings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(drawings),
                    keepalive: true
                })
                .then(response => response.json())
                .then(data => {
                })
                .catch(err => {});
            }

            function reportAction(action, feature) {
                try {
                    const payload = {
                        action,
                        result: 'ok',
                        feature_id: feature && feature.properties ? feature.properties._id : undefined,
                        geometry: feature && feature.geometry ? feature.geometry.type : undefined,
                        color: feature && feature.properties ? feature.properties.color : undefined,
                        hostile: feature && feature.properties ? feature.properties.hostile : undefined,
                        deleted: feature && feature.properties ? !!feature.properties.deleted : false
                    };

                    fetch('/action/log', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                        keepalive: true
                    }).catch(() => {});
                } catch (err) {
                }
            }

            function safeLoadDrawings() {
                fetch('/merge_drawings')
                    .then(r => r.json())
                    .then(data => {
                        drawings = Array.isArray(data.merged) ? data.merged : (Array.isArray(data) ? data : []);
                        editableLayers.clearLayers();
                        let loadedCount = 0;
                        drawings.forEach(f => {
                            if (f.properties.deleted) return;
                            const l = featureToLayer(f);
                            if (l) {
                                editableLayers.addLayer(l);

                                if (f.properties.isMarker) bindMarkerPopup(l);
                                else bindShapePopup(l);
                                loadedCount++;
                            }
                        });
                    })
                    .catch(err => {});
            }


            function initializeDemoDrawings() {
                const demoDrawings = [
                    {"type": "Feature", "properties": {"_id": 1, "deleted": false, "color": "blue", "isMarker": true, "hostile": false},
                     "geometry": {"type": "Point", "coordinates": [33.100, 35.100]}},
                    {"type": "Feature", "properties": {"_id": 3, "deleted": false, "color": "green", "hostile": false},
                     "geometry": {"type": "Polygon", "coordinates": [[[33.103, 35.103], [33.104, 35.104], [33.105, 35.103], [33.103, 35.103]]]}},
                    {"type": "Feature", "properties": {"_id": 4, "deleted": false, "color": "orange", "isMarker": true, "hostile": false},
                     "geometry": {"type": "Point", "coordinates": [33.106, 35.106]}}
                ];
                
                drawings = demoDrawings;
                editableLayers.clearLayers();
                
                let loadedCount = 0;
                drawings.forEach(f => {
                    if (f.properties.deleted) return;
                    const l = featureToLayer(f);
                    if (l) {
                        editableLayers.addLayer(l);
                        if (f.properties.isMarker) bindMarkerPopup(l);
                        else bindShapePopup(l);
                        loadedCount++;
                    }
                });
                
                saveDrawings();
                showAlert(`Loaded ${loadedCount} demo drawings`, 'success', 3000);
            }


            map.on(L.Draw.Event.CREATED, function (e) {
                const layer = e.layer;
                layer._hostile = false;
                

                if (layer instanceof L.Circle || layer instanceof L.CircleMarker || layer instanceof L.Polygon || layer instanceof L.Polyline || layer instanceof L.Rectangle)
                    layer.setStyle({ color: currentColor, fillColor: currentColor });
                if (layer instanceof L.Marker) layer.setIcon(markerIcons[currentColor]);


                editableLayers.addLayer(layer);
                const feature = layerToFeature(layer, currentColor);
                drawings.push(feature);


                if (layer instanceof L.Marker) bindMarkerPopup(layer);
                else bindShapePopup(layer);


                saveDrawings();
                reportAction('draw', feature);
            });

            map.on(L.Draw.Event.DELETED, function (e) {
                e.layers.eachLayer(l => {
                    const f = drawings.find(f => f.properties._id === l._leaflet_id);
                    if (f) {
                        f.properties.deleted = true;
                        reportAction('delete', f);
                    }
                });
                saveDrawings();
            });


            map.on(L.Draw.Event.DRAWSTART, function (e) {
            });

            map.on(L.Draw.Event.DRAWSTOP, function (e) {

                const toolbar = document.querySelector('.leaflet-draw-actions');
                if (toolbar) toolbar.style.display = 'none';
                map.getContainer().style.cursor = '';
            });


            map.on(L.Draw.Event.DELETESTART, function (e) {
            });

            map.on(L.Draw.Event.DELETESTOP, function (e) {
                const toolbar = document.querySelector('.leaflet-draw-actions');
                if (toolbar) toolbar.style.display = 'none';
                map.getContainer().style.cursor = '';
            });


            map.on('click', e => map.lastClick = e.latlng);

            document.querySelectorAll('.paste-btn').forEach(btn => btn.addEventListener('click', () => {
                const targetId = btn.getAttribute('data-target');
                const input = document.getElementById(targetId);
                let ll = lastMarkerClick ? lastMarkerClick.getLatLng() : map.lastClick || map.getCenter();
                input.value = ll.lng.toFixed(6) + ',' + ll.lat.toFixed(6);
            }));

            document.addEventListener('click', e => {
                const btn = e.target.closest('.copy-btn');
                if (!btn) return;
                const popup = btn.closest('.leaflet-popup-content');
                if (!popup) return;
                const labelEl = popup.querySelector('.popup-label');
                if (!labelEl) return;
                const text = labelEl.textContent.trim();
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text);
                } else {
                    const ta = document.createElement("textarea");
                    ta.value = text;
                    ta.style.position = "fixed";
                    ta.style.left = "-9999px";
                    document.body.appendChild(ta);
                    ta.focus();
                    ta.select();
                    document.execCommand("copy");
                    document.body.removeChild(ta);
                }
            });


            const CLEARANCE_MIN_M = 10;
            const CLEARANCE_MAX_M = 5000;

            function clearanceFromSlider(sliderValue) {
                const t = Math.min(1, Math.max(0, Number(sliderValue) / 100));
                const value = CLEARANCE_MIN_M * Math.pow(CLEARANCE_MAX_M / CLEARANCE_MIN_M, t);
                return Math.round(value);
            }

            function updateClearanceLabel() {
                const slider = document.getElementById('clearanceDistance');
                const clearanceMeters = clearanceFromSlider(slider.value);
                document.getElementById('clearanceValue').textContent = String(clearanceMeters);
            }

            document.getElementById('clearanceDistance').addEventListener('input', updateClearanceLabel);
            updateClearanceLabel();


            function plotPath() {
                const s = document.getElementById('start').value.split(',');
                const g = document.getElementById('goal').value.split(',');
                if (s.length !== 2 || g.length !== 2) {
                    showAlert('Please enter valid start and goal coordinates (lat,lon format)', 'info');
                    return;
                }
                const start_lon = parseFloat(s[0]), start_lat = parseFloat(s[1]);
                const goal_lon = parseFloat(g[0]), goal_lat = parseFloat(g[1]);
                const clearanceSliderValue = document.getElementById('clearanceDistance').value;
                const clearanceMeters = clearanceFromSlider(clearanceSliderValue);
                
                const latDiff = goal_lat - start_lat;
                const lonDiff = goal_lon - start_lon;
                const straightLineDistance = Math.sqrt(latDiff * latDiff + lonDiff * lonDiff);
                const distanceKm = straightLineDistance * 111;
                
                const distanceFactor = distanceKm * 0.45;
                const clearanceFactor = Math.log10((clearanceMeters / CLEARANCE_MIN_M) + 1) * 1.8;
                const estimatedSeconds = Math.max(2, Math.min(25, 1.5 + distanceFactor + clearanceFactor));
                
                setEtaText('Calculating...');
                startEtaCountdown(estimatedSeconds);
                
                fetch(`/compute_path?start_lat=${start_lat}&start_lon=${start_lon}&goal_lat=${goal_lat}&goal_lon=${goal_lon}&clearance=${clearanceMeters}`)
                    .then(r => r.json())
                    .then(res => {
                        stopEtaCountdown();
                        setEtaText('');
                        
                        if (res.error) {
                            showAlert(`${res.error}\nCheck console for details.`, 'error', 5000);
                            return;
                        }
                        
                        if (!res.path || !res.path.length) {
                            showAlert('No path found! Hostile zones may be blocking all routes.\nCheck console for details.', 'error', 4000);
                            return;
                        }
                        
                        const riskLevel = res.risk_level ? res.risk_level.toLowerCase() : 'info';
                        
                        const summaryParts = [
                            `Distance ${res.distance_m}m`,
                            `Time ${res.estimated_time_min} min`
                        ];

                        if (res.min_hostile_distance_m !== null && res.min_hostile_distance_m !== undefined) {
                            summaryParts.push(`Closest hostile ${res.min_hostile_distance_m}m`);
                        }

                        let alertMsg = summaryParts.join(' | ');

                        if (riskLevel === 'high') {
                            alertMsg += '\nAvoid this route if possible.';
                        } else if (riskLevel === 'medium') {
                            alertMsg += '\nUse caution near hostile zones.';
                        } else if (riskLevel === 'low') {
                            alertMsg += '\nRoute is clear of nearby hostile zones.';
                        }

                        showAlert(alertMsg, riskLevel, 7000);
                        

                        const oldPathIdx = drawings.findIndex(f => f.properties._id === 'path');
                        if (oldPathIdx >= 0) {
                            drawings[oldPathIdx].properties.deleted = true;

                            editableLayers.eachLayer(layer => {
                                if (layer._leaflet_id === 'path') {
                                    editableLayers.removeLayer(layer);
                                }
                            });
                        }
                        

                        const path = L.polyline(res.path.map(p => [p[0], p[1]]), { color: 'red' });
                        path._leaflet_id = 'path';
                        path._hostile = false;
                        

                        editableLayers.addLayer(path);
                        

                        bindShapePopup(path);
                        

                        const pathFeature = {
                            type: "Feature",
                            properties: { _id: 'path', color: 'red', hostile: false, deleted: false },
                            geometry: { type: "LineString", coordinates: res.path.map(p => [p[1], p[0]]) }
                        };
                        drawings.push(pathFeature);
                        saveDrawings();
                    })
                    .catch(err => {
                        showAlert('Path computation failed! Check console for details.', 'error');
                        setEtaText('');
                    });
            }


            function clearPath() {
                stopEtaCountdown();
                setEtaText('');

                editableLayers.eachLayer(layer => {
                    if (layer._leaflet_id === 'path') {
                        editableLayers.removeLayer(layer);
                    }
                });

                const idx = drawings.findIndex(f => f.properties._id === 'path');
                if (idx >= 0) drawings[idx].properties.deleted = true;
                saveDrawings();
            }


            const TIMER_KEY = 'nextMergeEpoch';
            let nextMergeEpoch = parseFloat(localStorage.getItem(TIMER_KEY)) || (Date.now() / 1000 + pollIntervalSec);

            const refreshRateSlider = document.getElementById('refresh-rate-slider');
            const refreshRateValue = document.getElementById('refresh-rate-value');
            refreshRateSlider.value = String(pollIntervalSec);
            refreshRateValue.textContent = `${pollIntervalSec}s`;

            function updateTimer() {
                if (refreshPaused) return;
                const now = Date.now() / 1000;
                let remaining = Math.round(nextMergeEpoch - now);
                if (remaining <= 0) {
                    safeLoadDrawings();
                    nextMergeEpoch = now + pollIntervalSec;
                    localStorage.setItem(TIMER_KEY, nextMergeEpoch);
                    remaining = pollIntervalSec;
                }
                document.getElementById('merge-timer').textContent = `Refresh in: ${remaining}`;
            }

            refreshRateSlider.addEventListener('input', () => {
                pollIntervalSec = parseInt(refreshRateSlider.value, 10);
                refreshRateValue.textContent = `${pollIntervalSec}s`;
                localStorage.setItem(REFRESH_RATE_KEY, String(pollIntervalSec));

                if (!refreshPaused) {
                    nextMergeEpoch = Date.now() / 1000 + pollIntervalSec;
                    localStorage.setItem(TIMER_KEY, nextMergeEpoch);
                    updateTimer();
                }
            });

            updateTimer();
            setInterval(updateTimer, 1000);

            document.getElementById('pause-btn').addEventListener('click', () => {
                refreshPaused = !refreshPaused;
                document.getElementById('pause-btn').textContent = refreshPaused ? 'Resume' : 'Pause';
                if (!refreshPaused) {
                    const currentRemaining = parseInt(document.getElementById('merge-timer').textContent.replace(/[^0-9]/g, ''), 10) || pollIntervalSec;
                    nextMergeEpoch = Date.now() / 1000 + currentRemaining;
                    localStorage.setItem(TIMER_KEY, nextMergeEpoch);
                    updateTimer();
                }
            });


            window.addEventListener('beforeunload', function(e) {
                const blob = new Blob([JSON.stringify(drawings)], {type: 'application/json'});
                navigator.sendBeacon('/save_drawings', blob);
            });


            setInterval(function() {
                if (drawings.length > 0) {
                    saveDrawings();
                }
            }, 10000);


            console.log('Initializing map...');
            safeLoadDrawings();
        </script>
    </body>

</html>
